        }
        body {
            background: var(--primary-bg);

        }

        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;

            transition: opacity 2s ease-in-out;
            opacity: 0;
        }

        /* 全螢幕閃爍警示層 */
        #danger-overlay {
            position: fixed;
            inset: 0;
            z-index: 50; 
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            background-color: rgba(239, 68, 68, 0);
        }
        
        #danger-overlay.active {
            animation: full-screen-danger 1.5s infinite ease-in-out;
            opacity: 1;
        }

        @keyframes full-screen-danger {
            0%, 100% { 
                background-color: rgba(239, 68, 68, 0); 
                box-shadow: inset 0 0 0px rgba(239, 68, 68, 0);
            }
            50% { 
                background-color: rgba(239, 68, 68, 0.15); 
                box-shadow: inset 0 0 150px rgba(239, 68, 68, 0.6); 
            }
        }

        /* 頂部狀態列 */
        #status-dashboard {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 480px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1rem;
            padding: 0.75rem;
            display: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        #status-dashboard.active { display: block; }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.5rem;
            padding: 0.4rem 0.6rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-warning {
            border-color: rgba(239, 68, 68, 0.6);
            background: rgba(239, 68, 68, 0.15);
        }

        .progress-container {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }

        .bar { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }

        .animate-pulse-fast {
            animation: pulse-fast 0.8s infinite;
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 1; filter: brightness(1.2); }
            50% { opacity: 0.5; filter: brightness(0.8); }
        }

        /* 遊戲排版 */
        .stage { 
            display: none; 
            min-height: 100vh;
            padding: 120px 1.25rem 40px; 
        }
        .stage.active { display: flex; flex-direction: column; justify-content: center; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2.25rem 1.75rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 60; 
        }

        .btn-option {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.5;
            transition: all 0.3s ease;
            color: #e0e0e0;
            text-align: left;
            margin-bottom: 0.85rem;
            position: relative;
            overflow: hidden;
        }
        .btn-option:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.15); }
        @media (min-width: 768px) {
            .btn-option:hover { background: #fff; color: #000; transform: translateX(8px); }
        }

        #feedback-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            z-index: 200;
            display: none;
            padding: 2.5rem;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #feedback-overlay.active { display: flex; }

        .fade-up { animation: fadeUp 1s ease-out forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
