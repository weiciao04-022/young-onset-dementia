<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>貸款與租房比較工具</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe2ea;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --good: #0f766e;
      --bad: #b91c1c;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      font-size: 32px;
      margin: 0 0 8px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 20px;
      position: sticky;
      top: 20px;
    }

    .panel h2,
    .results h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      margin: 20px 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
    }

    input[type="number"], select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: white;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--primary);
      color: white;
      flex: 1;
    }

    .secondary {
      background: #eef2f7;
      color: var(--text);
    }

    .results {
      padding: 20px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .summary-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: #fcfdff;
    }

    .summary-box .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .summary-box .value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .good { color: var(--good); }
    .bad { color: var(--bad); }

    .chart-wrap {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: white;
      margin-bottom: 18px;
    }

    canvas {
      width: 100%;
      height: 320px;
      display: block;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 880px;
      background: white;
    }

    thead {
      background: #f8fafc;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      font-size: 14px;
      white-space: nowrap;
    }

    th:first-child, td:first-child { text-align: center; }
    th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) { text-align: right; }

    .winner-rent {
      background: rgba(15, 118, 110, 0.06);
    }

    .winner-buy {
      background: rgba(37, 99, 235, 0.08);
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 16px;
      }

      h1 {
        font-size: 26px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>貸款與租房比較工具</h1>
    <p class="subtitle">比較多年期內「租房」與「買房貸款」的總支出、淨資產與每年差異。</p>

    <div class="grid">
      <div class="card panel">
        <div class="badge">獨立 HTML｜可直接存成 .html 開啟</div>
        <h2>輸入條件</h2>

        <div class="section-title">租房參數</div>
        <div class="field">
          <label>
            <span>每月租金</span>
            <span class="hint">元</span>
          </label>
          <input id="monthlyRent" type="number" value="25000" min="0" step="1000" />
        </div>
        <div class="field">
          <label>
            <span>年租金漲幅</span>
            <span class="hint">%</span>
          </label>
          <input id="rentGrowth" type="number" value="2" min="0" step="0.1" />
        </div>

        <div class="section-title">買房參數</div>
        <div class="field">
          <label>
            <span>房價</span>
            <span class="hint">元</span>
          </label>
          <input id="housePrice" type="number" value="12000000" min="0" step="100000" />
        </div>
        <div class="field">
          <label>
            <span>自備款比例</span>
            <span class="hint">%</span>
          </label>
          <input id="downPaymentRate" type="number" value="20" min="0" max="100" step="1" />
        </div>
        <div class="field">
          <label>
            <span>貸款利率</span>
            <span class="hint">年利率 %</span>
          </label>
          <input id="interestRate" type="number" value="2.2" min="0" step="0.01" />
        </div>
        <div class="field">
          <label>
            <span>貸款年限</span>
            <span class="hint">年</span>
          </label>
          <input id="loanYears" type="number" value="30" min="1" step="1" />
        </div>
        <div class="field">
          <label>
            <span>每年持有成本</span>
            <span class="hint">稅、管理、維修</span>
          </label>
          <input id="annualOwnershipCost" type="number" value="60000" min="0" step="1000" />
        </div>
        <div class="field">
          <label>
            <span>房價年增率</span>
            <span class="hint">%</span>
          </label>
          <input id="houseGrowth" type="number" value="1.5" min="-20" step="0.1" />
        </div>

        <div class="section-title">比較設定</div>
        <div class="field">
          <label>
            <span>比較年數</span>
            <span class="hint">1–40 年</span>
          </label>
          <input id="compareYears" type="number" value="15" min="1" max="40" step="1" />
        </div>

        <div class="btn-row">
          <button class="primary" id="calculateBtn">重新計算</button>
          <button class="secondary" id="presetBtn">載入範例</button>
        </div>
      </div>

      <div class="card results">
        <h2>比較結果</h2>
        <div class="summary-grid">
          <div class="summary-box">
            <div class="label">租房總支出</div>
            <div class="value" id="totalRentCost">—</div>
          </div>
          <div class="summary-box">
            <div class="label">買房總現金流出</div>
            <div class="value" id="totalBuyOutflow">—</div>
          </div>
          <div class="summary-box">
            <div class="label">期末房屋淨資產</div>
            <div class="value" id="buyEquity">—</div>
          </div>
          <div class="summary-box">
            <div class="label">結論</div>
            <div class="value" id="finalDecision">—</div>
          </div>
        </div>

        <div class="chart-wrap">
          <canvas id="comparisonChart" width="900" height="320"></canvas>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>年份</th>
                <th>當年租金支出</th>
                <th>累計租房支出</th>
                <th>當年房貸本息</th>
                <th>當年持有成本</th>
                <th>累計買房流出</th>
                <th>剩餘貸款</th>
                <th>房屋估值</th>
                <th>房屋淨資產</th>
                <th>較有利方案</th>
              </tr>
            </thead>
            <tbody id="resultTableBody"></tbody>
          </table>
        </div>

        <div class="note" id="noteText"></div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const fmtCurrency = (num) => {
      return new Intl.NumberFormat('zh-TW', {
        style: 'currency',
        currency: 'TWD',
        maximumFractionDigits: 0
      }).format(num);
    };

    const fmtNumber = (num) => {
      return new Intl.NumberFormat('zh-TW', {
        maximumFractionDigits: 0
      }).format(num);
    };

    function getInputs() {
      return {
        monthlyRent: parseFloat($("monthlyRent").value) || 0,
        rentGrowth: (parseFloat($("rentGrowth").value) || 0) / 100,
        housePrice: parseFloat($("housePrice").value) || 0,
        downPaymentRate: (parseFloat($("downPaymentRate").value) || 0) / 100,
        interestRate: (parseFloat($("interestRate").value) || 0) / 100,
        loanYears: parseInt($("loanYears").value) || 1,
        annualOwnershipCost: parseFloat($("annualOwnershipCost").value) || 0,
        houseGrowth: (parseFloat($("houseGrowth").value) || 0) / 100,
        compareYears: Math.min(40, Math.max(1, parseInt($("compareYears").value) || 1))
      };
    }

    function calcMonthlyPayment(principal, annualRate, years) {
      const months = years * 12;
      const monthlyRate = annualRate / 12;

      if (months <= 0) return 0;
      if (monthlyRate === 0) return principal / months;

      return principal * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1);
    }

    function generateData(inputs) {
      const downPayment = inputs.housePrice * inputs.downPaymentRate;
      const loanPrincipal = Math.max(0, inputs.housePrice - downPayment);
      const monthlyPayment = calcMonthlyPayment(loanPrincipal, inputs.interestRate, inputs.loanYears);
      const loanMonths = inputs.loanYears * 12;
      const compareMonths = inputs.compareYears * 12;
      const monthlyRate = inputs.interestRate / 12;

      let remainingLoan = loanPrincipal;
      let cumulativeRent = 0;
      let cumulativeBuy = downPayment;
      let rows = [];
      let rentSeries = [];
      let buySeries = [];
      let equitySeries = [];

      for (let year = 1; year <= inputs.compareYears; year++) {
        const annualRent = inputs.monthlyRent * 12 * Math.pow(1 + inputs.rentGrowth, year - 1);
        cumulativeRent += annualRent;

        let annualMortgagePayment = 0;
        for (let m = 1; m <= 12; m++) {
          const currentMonth = (year - 1) * 12 + m;
          if (currentMonth <= loanMonths && remainingLoan > 0.5) {
            if (monthlyRate === 0) {
              const principalPaid = Math.min(remainingLoan, monthlyPayment);
              remainingLoan -= principalPaid;
              annualMortgagePayment += principalPaid;
            } else {
              const interest = remainingLoan * monthlyRate;
              const principalPaid = Math.min(remainingLoan, monthlyPayment - interest);
              remainingLoan -= principalPaid;
              annualMortgagePayment += (principalPaid + interest);
            }
          }
        }

        const annualOwnershipCost = inputs.annualOwnershipCost;
        cumulativeBuy += annualMortgagePayment + annualOwnershipCost;

        const currentHouseValue = inputs.housePrice * Math.pow(1 + inputs.houseGrowth, year);
        const equity = currentHouseValue - Math.max(0, remainingLoan);

        const rentNetCost = cumulativeRent;
        const buyNetCost = cumulativeBuy - equity;
        const winner = buyNetCost < rentNetCost ? '買房較有利' : (buyNetCost > rentNetCost ? '租房較有利' : '兩者接近');

        rows.push({
          year,
          annualRent,
          cumulativeRent,
          annualMortgagePayment,
          annualOwnershipCost,
          cumulativeBuy,
          remainingLoan: Math.max(0, remainingLoan),
          currentHouseValue,
          equity,
          winner,
          rentNetCost,
          buyNetCost
        });

        rentSeries.push(cumulativeRent);
        buySeries.push(cumulativeBuy);
        equitySeries.push(equity);
      }

      return {
        downPayment,
        loanPrincipal,
        monthlyPayment,
        rows
      };
    }

    function renderSummary(data) {
      const last = data.rows[data.rows.length - 1];
      const buyNetCost = last.cumulativeBuy - last.equity;
      const diff = Math.abs(last.cumulativeRent - buyNetCost);
      const isBuyBetter = buyNetCost < last.cumulativeRent;

      $("totalRentCost").textContent = fmtCurrency(last.cumulativeRent);
      $("totalBuyOutflow").textContent = fmtCurrency(last.cumulativeBuy);
      $("buyEquity").textContent = fmtCurrency(last.equity);

      const decisionEl = $("finalDecision");
      decisionEl.textContent = isBuyBetter
        ? `買房省 ${fmtNumber(diff)} 元`
        : `租房省 ${fmtNumber(diff)} 元`;
      decisionEl.className = `value ${isBuyBetter ? 'good' : 'bad'}`;

      $("noteText").textContent = `說明：此工具以「租房累計支出」對比「買房累計現金流出 - 期末房屋淨資產」做比較。買房現金流出包含自備款、房貸本息與每年持有成本。未納入投資報酬、機會成本、稅制細節、裝潢與交易成本，因此適合做初步估算，不適合作為最終購屋決策依據。貸款月付金約為 ${fmtCurrency(data.monthlyPayment)}。`;
    }

    function renderTable(data) {
      const tbody = $("resultTableBody");
      tbody.innerHTML = "";

      data.rows.forEach((row) => {
        const tr = document.createElement('tr');
        tr.className = row.winner === '租房較有利' ? 'winner-rent' : (row.winner === '買房較有利' ? 'winner-buy' : '');
        tr.innerHTML = `
          <td>${row.year}</td>
          <td>${fmtCurrency(row.annualRent)}</td>
          <td>${fmtCurrency(row.cumulativeRent)}</td>
          <td>${fmtCurrency(row.annualMortgagePayment)}</td>
          <td>${fmtCurrency(row.annualOwnershipCost)}</td>
          <td>${fmtCurrency(row.cumulativeBuy)}</td>
          <td>${fmtCurrency(row.remainingLoan)}</td>
          <td>${fmtCurrency(row.currentHouseValue)}</td>
          <td>${fmtCurrency(row.equity)}</td>
          <td>${row.winner}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderChart(data) {
      const canvas = $("comparisonChart");
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const cssWidth = canvas.clientWidth || 900;
      const cssHeight = 320;
      canvas.width = cssWidth * dpr;
      canvas.height = cssHeight * dpr;
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, cssWidth, cssHeight);

      const padding = { top: 20, right: 20, bottom: 40, left: 70 };
      const plotW = cssWidth - padding.left - padding.right;
      const plotH = cssHeight - padding.top - padding.bottom;

      const rentValues = data.rows.map(r => r.cumulativeRent);
      const buyNetValues = data.rows.map(r => r.cumulativeBuy - r.equity);
      const all = [...rentValues, ...buyNetValues];
      const maxVal = Math.max(...all, 1);

      const x = (i) => padding.left + (plotW * i / Math.max(1, data.rows.length - 1));
      const y = (v) => padding.top + plotH - (v / maxVal) * plotH;

      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, padding.top + plotH);
      ctx.lineTo(padding.left + plotW, padding.top + plotH);
      ctx.stroke();

      for (let i = 0; i <= 4; i++) {
        const value = maxVal * i / 4;
        const yy = y(value);
        ctx.strokeStyle = '#e5e7eb';
        ctx.beginPath();
        ctx.moveTo(padding.left, yy);
        ctx.lineTo(padding.left + plotW, yy);
        ctx.stroke();

        ctx.fillStyle = '#6b7280';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(fmtNumber(value), padding.left - 8, yy + 4);
      }

      function drawLine(values, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        values.forEach((v, i) => {
          if (i === 0) ctx.moveTo(x(i), y(v));
          else ctx.lineTo(x(i), y(v));
        });
        ctx.stroke();

        values.forEach((v, i) => {
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(x(i), y(v), 3.5, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      drawLine(rentValues, '#0f766e');
      drawLine(buyNetValues, '#2563eb');

      ctx.fillStyle = '#111827';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      data.rows.forEach((row, i) => {
        ctx.fillText(`${row.year}年`, x(i), padding.top + plotH + 20);
      });

      ctx.fillStyle = '#0f766e';
      ctx.fillRect(padding.left, 4, 14, 14);
      ctx.fillStyle = '#111827';
      ctx.textAlign = 'left';
      ctx.fillText('租房累計支出', padding.left + 20, 16);

      ctx.fillStyle = '#2563eb';
      ctx.fillRect(padding.left + 130, 4, 14, 14);
      ctx.fillStyle = '#111827';
      ctx.fillText('買房淨成本（累計流出 - 淨資產）', padding.left + 150, 16);
    }

    function calculate() {
      const inputs = getInputs();
      const data = generateData(inputs);
      renderSummary(data);
      renderTable(data);
      renderChart(data);
    }

    $("calculateBtn").addEventListener('click', calculate);

    $("presetBtn").addEventListener('click', () => {
      $("monthlyRent").value = 28000;
      $("rentGrowth").value = 2;
      $("housePrice").value = 15000000;
      $("downPaymentRate").value = 20;
      $("interestRate").value = 2.35;
      $("loanYears").value = 30;
      $("annualOwnershipCost").value = 80000;
      $("houseGrowth").value = 2;
      $("compareYears").value = 20;
      calculate();
    });

    window.addEventListener('resize', calculate);
    calculate();
  </script>
</body>
</html>
