<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>年輕型失智症：消失的時光</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000000;
            color: #d4d4d4;
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .serif { font-family: 'Noto Serif TC', serif; }
        
        /* 背景容器 */
        #bg-container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        #global-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.4);
            transition: opacity 1s ease-in-out;
            opacity: 0;
        }

        .fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 數值條 */
        .value-bar { 
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); 
            height: 100%;
        }

        .stage { display: none; }
        .stage.active { display: flex; flex-direction: column; justify-content: center; min-height: 100vh; }

        .glass-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        #feedback-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            text-align: center;
        }
        #feedback-overlay.active { display: flex; }

        .next-btn-anim { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <!-- 背景容器：純影片模式 -->
    <div id="bg-container">
        <video id="global-video" muted loop playsinline></video>
    </div>

    <!-- 頂部狀態列 -->
    <div id="status-bar" class="fixed top-0 left-0 w-full p-4 bg-black/60 backdrop-blur-md z-[100] border-b border-white/5 hidden">
        <div class="max-w-xl mx-auto grid grid-cols-3 gap-4">
            <div class="space-y-1">
                <div class="flex justify-between text-[10px] text-neutral-400 font-bold uppercase">
                    <span>患者狀態</span>
                    <span id="val-patient">80</span>
                </div>
                <div class="h-1.5 bg-neutral-900 rounded-full overflow-hidden">
                    <div id="bar-patient" class="value-bar bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]" style="width: 80%"></div>
                </div>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-[10px] text-neutral-400 font-bold uppercase">
                    <span>尊嚴指數</span>
                    <span id="val-dignity">80</span>
                </div>
                <div class="h-1.5 bg-neutral-900 rounded-full overflow-hidden">
                    <div id="bar-dignity" class="value-bar bg-white shadow-[0_0_8px_rgba(255,255,255,0.3)]" style="width: 80%"></div>
                </div>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-[10px] text-neutral-400 font-bold uppercase">
                    <span>家屬負荷</span>
                    <span id="val-burden">80</span>
                </div>
                <div class="h-1.5 bg-neutral-900 rounded-full overflow-hidden">
                    <div id="bar-burden" class="value-bar bg-red-600 shadow-[0_0_8px_rgba(220,38,38,0.5)]" style="width: 80%"></div>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-xl mx-auto px-6 relative z-10">
        
        <!-- 前導敘事 -->
        <section id="prologue" class="stage active fade-in space-y-8 text-center">
            <div class="glass-panel space-y-6">
                <h1 class="serif text-3xl font-bold text-white tracking-widest leading-relaxed">面對年輕型失智症<br><span class="text-xl opacity-60 italic">消失的時光</span></h1>
                <div class="space-y-4 text-neutral-300 font-light leading-relaxed">
                    <p>一場意外車禍，醫生的拼命治療，讓他留在這個世界。</p>
                    <p>但隨之而來的，是記憶的緩慢淡去。</p>
                    <p class="serif text-white text-lg py-2">「醫生說，這是阿茲海默症。」</p>
                    <p>那年，他才三十九歲。</p>
                </div>
                <button onclick="showStage('intro')" class="w-full py-4 border border-white/20 text-white/70 hover:text-white hover:bg-white/10 transition-all tracking-[0.3em] text-xs rounded-lg">
                    點擊體驗家屬的生活
                </button>
            </div>
        </section>

        <!-- 年齡猜測 -->
        <section id="intro" class="stage fade-in space-y-8 text-center">
            <div class="glass-panel space-y-8">
                <h2 class="serif text-2xl text-white">你認為最年輕的<br>失智症患者是幾歲？</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="showStage('answer')" class="py-8 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all text-xl">21 歲</button>
                    <button onclick="showStage('answer')" class="py-8 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all text-xl">35 歲</button>
                    <button onclick="showStage('answer')" class="py-8 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all text-xl">19 歲</button>
                    <button onclick="showStage('answer')" class="py-8 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all text-xl">45 歲</button>
                </div>
            </div>
        </section>

        <!-- 答案揭曉 -->
        <section id="answer" class="stage fade-in space-y-8 text-center">
            <div class="glass-panel space-y-10">
                <div class="space-y-2">
                    <p class="text-[10px] tracking-[0.5em] text-neutral-400 uppercase">Medical Reality</p>
                    <h2 class="serif text-9xl text-white font-bold">19</h2>
                </div>
                <p class="text-neutral-300 font-light leading-relaxed">這不是罕見個案。正值壯年的年紀，有人年薪千萬；有人卻罹患失智症，只能在家。</p>
                <button onclick="startGame()" class="w-full py-5 bg-white text-black font-bold tracking-widest hover:bg-neutral-200 transition-all uppercase text-sm rounded-lg">
                    幫助家屬選擇更好的生活
                </button>
            </div>
        </section>

        <!-- 遊戲核心 -->
        <section id="game" class="stage">
            <div class="glass-panel space-y-6 relative">
                <div class="flex justify-between items-start border-b border-white/10 pb-4 mb-2">
                    <h3 id="scen-title" class="serif text-2xl text-white font-bold"></h3>
                </div>
                <p id="scen-desc" class="text-base text-neutral-200 font-light leading-relaxed"></p>
                <div id="game-content" class="opacity-0 transition-opacity duration-700 space-y-3">
                    <div id="scen-options" class="space-y-3"></div>
                </div>
            </div>
        </section>

        <!-- 結局 -->
        <section id="ending" class="stage text-center">
            <div class="glass-panel space-y-10">
                <h2 id="ending-title" class="serif text-5xl text-white">無解的終局</h2>
                <div id="ending-desc" class="space-y-6 text-neutral-300 font-light leading-relaxed"></div>
                <button onclick="location.reload()" class="px-10 py-3 border border-white/20 text-neutral-400 hover:text-white hover:border-white transition-all text-xs tracking-[0.3em] rounded-full">
                    重啟人生
                </button>
            </div>
        </section>

    </main>

    <!-- 反饋遮罩 -->
    <div id="feedback-overlay">
        <div class="max-w-xs space-y-10">
            <p id="feedback-text" class="text-xl text-white font-light serif leading-relaxed italic"></p>
            <button id="next-btn" onclick="nextScenario()" class="next-btn-anim text-xs tracking-[0.4em] text-white/60 hover:text-white uppercase">
                下一個抉擇 ➜
            </button>
        </div>
    </div>

    <script>
        const state = {
            patient: 80,
            dignity: 80,
            burden: 80,
            currentIdx: 0,
            isLocked: false
        };

        const scenarios = [
            {
                title: '晚餐過後',
                desc: '吃完晚餐才十分鐘，他第十五次詢問「我們什麼時候吃飯？」。你剛結束整天的加班，耐心已消磨殆盡。',
                options: [
                    { text: '深呼吸，帶他去看空碗，溫柔地說「剛吃過了」。', impact: { patient: 5, dignity: 5, burden: -10 }, feedback: '他露出困惑但安心的神情。你卻在轉身時感到一陣巨大的疲憊。' },
                    { text: '遞給他一塊餅乾，告訴他先墊墊胃。', impact: { patient: 10, dignity: 0, burden: -5 }, feedback: '他高興地吃了。但這導致他血糖升高且體重失控，增加了未來的照顧負擔。' },
                    { text: '終於崩潰大喊：「你剛剛才吃過！為什麼一直問！」', impact: { patient: -15, dignity: -20, burden: 5 }, feedback: '他被嚇壞了，縮在沙發角落。家裡安靜了，但空氣中充滿了令人窒息的罪惡感。' }
                ]
            },
            {
                title: '應徵工作',
                desc: '他不到四十歲，堅持「我還能上班」。你去幫他接洽熟識的店鋪嘗試簡易工作，但老闆得知病況後婉拒了。',
                options: [
                    { text: '實話實說，告訴他社會現在還沒準備好接納他。', impact: { patient: -10, dignity: -20, burden: 10 }, feedback: '他沉默地撕掉名片，眼神裡最後的光熄滅了。' },
                    { text: '編造謊言：「現在景氣不好，大家都在放假」。', impact: { patient: 5, dignity: 10, burden: -5 }, feedback: '保住了他的自尊，但他每天準時著裝待發，你的謊言越來越難圓。' },
                    { text: '自己在家開設模擬工作坊，讓他處理家務並付「薪水」。', impact: { patient: 10, dignity: 15, burden: -20 }, feedback: '他覺得自己很有用。但你的經濟與心理壓力變得更加沈重。' }
                ]
            },
            {
                title: '超市失控',
                desc: '超市排隊時，他突然因為找不到錢包而恐慌尖叫，甚至推倒了前方的路人。路人憤怒地要求報警。',
                options: [
                    { text: '不斷鞠躬致歉，並大聲解釋「他生病了，他不是故意的」。', impact: { patient: 0, dignity: -30, burden: -10 }, feedback: '人群散去，但他聽到你說他生病，臉上滿是羞愧。' },
                    { text: '私下賠償路人損失，並迅速帶他離開現場。', impact: { patient: 5, dignity: 5, burden: -15 }, feedback: '保住了場面，但你的口袋與意志力都因此縮水。' },
                    { text: '當場跟他一起情緒崩潰，對路人大喊「你懂什麼！」。', impact: { patient: -10, dignity: -10, burden: 15 }, feedback: '雖然一時發洩，但場面失控，你們最後被帶進警局處理。' }
                ]
            },
            {
                title: '申請補助',
                desc: '鑑定結果卻因為他「身體功能強健」而不符失能補助。所有的重擔，只能由家庭承擔。',
                options: [
                    { text: '花錢請律師與專家，準備漫長的上訴與複查程序。', impact: { patient: 0, dignity: 0, burden: -30 }, feedback: '這是一場法律馬拉松，在拿到錢之前，你可能先垮掉。' },
                    { text: '放棄補助，兼職更多工作來支付昂貴的日間照護費。', impact: { patient: 10, dignity: 5, burden: -25 }, feedback: '他獲得了照顧，但你已經連續三個月每天睡不到四小時。' },
                    { text: '減少照護開銷，將他關在家中，並安裝遠端攝影機監控。', impact: { patient: -20, dignity: -20, burden: 10 }, feedback: '經濟省下了，但他在監控畫面中孤獨轉圈的模樣，讓你心如刀割。' }
                ]
            },
            {
                title: '最後的決定',
                desc: '你已經筋疲力盡，親友勸你送機構。但因為他太年輕，只有昂貴的精神護理院願意收。',
                options: [
                    { text: '簽下合約。承認自己無法承擔，看著他被帶走。', impact: { patient: -30, dignity: -10, burden: 40 }, feedback: '負擔減輕了，但你回家看著空蕩蕩的客廳，心碎的聲音比他尖叫時更響。' },
                    { text: '堅持留在家，向政府爭取更多居家服務。', impact: { patient: 10, dignity: 10, burden: -20 }, feedback: '他在熟悉的環境，但居服員也常因為他的「年輕體力」而被嚇走。' },
                    { text: '賣掉房子，搬去更遠、更便宜的護理機構陪他一起住。', impact: { patient: 10, dignity: -15, burden: -30 }, feedback: '你們在一起，但你失去原本的工作與生活。' }
                ]
            }
        ];

        const bgVid = document.getElementById('global-video');

        /**
         * 切換背景影片邏輯
         * @param {string} name 影片檔案名稱 (不含副檔名)
         */
        function changeBackground(name) {
            const vidPath = `./pic/${name}.mp4`;

            // 先淡出當前畫面
            bgVid.style.opacity = '0';

            setTimeout(() => {
                // 更換影片來源
                bgVid.src = vidPath;
                bgVid.load();
                
                // 播放影片
                const playPromise = bgVid.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        // 播放成功後淡入
                        bgVid.style.opacity = '1';
                    }).catch(error => {
                        console.log("影片播放受阻：", error);
                    });
                }
            }, 300);
        }

        function hideAll() {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById('feedback-overlay').classList.remove('active');
            document.getElementById('status-bar').classList.add('hidden');
        }

        function showStage(name) {
            hideAll();
            document.getElementById(name).classList.add('active');
            if (name === 'game') {
                document.getElementById('status-bar').classList.remove('hidden');
            }
            window.scrollTo(0,0);
        }

        function startGame() {
            state.currentIdx = 0;
            state.patient = 80;
            state.dignity = 80;
            state.burden = 80;
            refreshBars();
            showStage('game');
            loadScenario();
        }

        function loadScenario() {
            const sc = scenarios[state.currentIdx];
            if (!sc) {
                showFinalEnding();
                return;
            }

            state.isLocked = false;
            const content = document.getElementById('game-content');
            content.style.opacity = '0';
            
            // 切換對應的影片檔案 (scene1.mp4, scene2.mp4...)
            changeBackground(`scene${state.currentIdx + 1}`);

            document.getElementById('scen-title').innerText = sc.title;
            document.getElementById('scen-desc').innerText = sc.desc;
            
            const optBox = document.getElementById('scen-options');
            optBox.innerHTML = '';
            sc.options.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'w-full text-left bg-white/5 border border-white/10 p-5 rounded-xl text-sm leading-relaxed hover:bg-white hover:text-black hover:scale-[1.01] transition-all duration-300';
                b.innerText = o.text;
                b.onclick = () => handleChoice(i);
                optBox.appendChild(b);
            });

            setTimeout(() => {
                content.style.opacity = '1';
            }, 500);
        }

        function handleChoice(idx) {
            if (state.isLocked) return;
            const opt = scenarios[state.currentIdx].options[idx];
            state.isLocked = true;

            state.patient = Math.min(100, Math.max(0, state.patient + opt.impact.patient));
            state.dignity = Math.min(100, Math.max(0, state.dignity + opt.impact.dignity));
            state.burden = Math.min(100, Math.max(0, state.burden + opt.impact.burden));
            
            refreshBars();
            document.getElementById('feedback-text').innerText = opt.feedback;
            document.getElementById('feedback-overlay').classList.add('active');
        }

        function refreshBars() {
            ['patient', 'dignity', 'burden'].forEach(k => {
                const bar = document.getElementById('bar-' + k);
                const val = document.getElementById('val-' + k);
                if (bar) bar.style.width = state[k] + '%';
                if (val) val.innerText = state[k];
            });
            
            if (state.patient <= 0 || state.dignity <= 0 || state.burden <= 0) {
                setTimeout(() => {
                    hideAll();
                    changeBackground('ending');
                    document.getElementById('ending').classList.add('active');
                    document.getElementById('ending-title').innerText = "生命之火已燃盡";
                    document.getElementById('ending-desc').innerHTML = "<p>在無盡的選擇中，你們都已筋疲力盡。<br>這不是你的錯，這是年輕型失智症家屬共有的困境。</p>";
                }, 800);
            }
        }

        function nextScenario() {
            document.getElementById('feedback-overlay').classList.remove('active');
            state.currentIdx++;
            loadScenario();
        }

        function showFinalEnding() {
            showStage('ending');
            changeBackground('ending');
            document.getElementById('ending-title').innerText = "漫長告別的開始";
            document.getElementById('ending-desc').innerHTML = `
                <p>五個抉擇，僅是家屬生活中的幾秒鐘。</p>
                <p>面對無法痊癒的疾病，我們需要的可能不只是選擇，<br>而是社會整體的恢復尊嚴與支持。</p>
            `;
        }

        // 初始載入 start.mp4
        window.onload = () => {
            changeBackground('start');
        };
    </script>
</body>
</html>
