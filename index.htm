<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>年輕型失智症：消失的時光</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000000;
            color: #f5f5f5;
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .serif { font-family: 'Noto Serif TC', serif; }
        
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: #000;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            filter: brightness(0.4);
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
        }
        .bg-image.active { opacity: 1; }

        .fade-in { animation: fadeIn 1s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .value-bar { 
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); 
            height: 100%;
        }

        .stage { display: none; }
        .stage.active { display: flex; flex-direction: column; justify-content: center; min-height: 100vh; padding: 20px 0; }

        .glass-panel {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            width: 100%;
        }

        #feedback-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            text-align: center;
        }
        #feedback-overlay.active { display: flex; }

        .btn-option {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            line-height: 1.6;
            transition: all 0.3s ease;
            color: #ddd;
            text-align: left;
        }
        .btn-option:hover {
            background: rgba(255, 255, 255, 1);
            color: #000;
            transform: translateX(8px);
        }
    </style>
</head>
<body>

    <div id="bg-container">
        <img id="bg-img-a" class="bg-image active" alt="">
        <img id="bg-img-b" class="bg-image" alt="">
    </div>

    <!-- 狀態列 -->
    <div id="status-bar" class="fixed top-0 left-0 w-full p-4 bg-black/60 backdrop-blur-lg z-[100] border-b border-white/5 hidden">
        <div class="max-w-xl mx-auto grid grid-cols-3 gap-6">
            <div class="space-y-1">
                <div class="flex justify-between text-[10px] text-neutral-400 font-bold tracking-wider">
                    <span>患者狀態</span>
                    <span id="val-patient">80</span>
                </div>
                <div class="h-1 bg-neutral-800 rounded-full overflow-hidden">
                    <div id="bar-patient" class="value-bar bg-blue-500" style="width: 80%"></div>
                </div>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-[10px] text-neutral-400 font-bold tracking-wider">
                    <span>尊嚴指數</span>
                    <span id="val-dignity">80</span>
                </div>
                <div class="h-1 bg-neutral-800 rounded-full overflow-hidden">
                    <div id="bar-dignity" class="value-bar bg-white" style="width: 80%"></div>
                </div>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-[10px] text-neutral-400 font-bold tracking-wider">
                    <span>家屬負荷</span>
                    <span id="val-burden">80</span>
                </div>
                <div class="h-1 bg-neutral-800 rounded-full overflow-hidden">
                    <div id="bar-burden" class="value-bar bg-red-600" style="width: 80%"></div>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-xl mx-auto px-6 relative z-10">
        <!-- 階段 1: 前導 -->
        <section id="prologue" class="stage active fade-in text-center">
            <div class="glass-panel space-y-8">
                <h1 class="serif text-3xl font-bold text-white tracking-widest leading-relaxed">面對年輕型失智症<br><span class="text-xl opacity-50 ">該如何抉擇</span></h1>
                <div class="space-y-5 text-neutral-300 font-light leading-relaxed text-sm">
                    <p>一場意外車禍，醫生的拼命治療，讓他留在這個世界。</p>
                    <p>但是，他去和以前變得不一樣了。</p>
                    <p class="serif text-white text-lg py-2 border-y border-white/10">「醫生說，這是失智症。」</p>
                    <p>那年，他才三十九歲。</p>
                </div>
                <button onclick="showStage('intro')" class="w-full py-4 border border-white/20 text-white/70 hover:text-white hover:bg-white/10 transition-all tracking-[0.3em] text-xs rounded-lg mt-4">
                    點擊體驗家屬的生活
                </button>
            </div>
        </section>

        <!-- 階段 2: 猜測題 -->
        <section id="intro" class="stage fade-in text-center">
            <div class="glass-panel space-y-10">
                <h2 class="serif text-2xl text-white leading-relaxed">你認為全世界目前<br>最年輕的失智症患者是幾歲？</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="showStage('answer')" class="py-8 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all text-xl font-light">21 歲</button>
                    <button onclick="showStage('answer')" class="py-8 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all text-xl font-light">35 歲</button>
                    <button onclick="showStage('answer')" class="py-8 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all text-xl font-light">19 歲</button>
                    <button onclick="showStage('answer')" class="py-8 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all text-xl font-light">45 歲</button>
                </div>
            </div>
        </section>

        <!-- 階段 3: 揭曉答案 -->
        <section id="answer" class="stage fade-in text-center">
            <div class="glass-panel space-y-10">
                <div class="space-y-2">
                    <p class="text-[10px] tracking-[0.5em] text-neutral-400 uppercase">Case Report</p>
                    <h2 class="serif text-9xl text-white font-bold">19</h2>
                </div>
                <p class="text-neutral-300 font-light leading-relaxed text-base">這不是罕見個案。<br>在正值壯年的年紀，有人年薪千萬；<br>有人卻罹患失智症，世界從此停滯。</p>
                <button onclick="startGame()" class="w-full py-5 bg-white text-black font-bold tracking-widest hover:bg-neutral-200 transition-all uppercase text-xs rounded-lg">
                    進入家屬的生活抉擇
                </button>
            </div>
        </section>

        <!-- 遊戲主體 -->
        <section id="game" class="stage">
            <div class="glass-panel space-y-8 relative">
                <div class="space-y-3 border-b border-white/10 pb-6">
                    <p id="scen-counter" class="text-[10px] text-white/40 tracking-[0.2em] uppercase"></p>
                    <h3 id="scen-title" class="serif text-2xl text-white font-bold"></h3>
                </div>
                <p id="scen-desc" class="text-base text-neutral-200 font-light leading-relaxed"></p>
                <div id="game-content" class="opacity-0 transition-opacity duration-1000 space-y-4">
                    <div id="scen-options" class="space-y-4"></div>
                </div>
            </div>
        </section>

        <!-- 階段 4: 結局 -->
        <section id="ending" class="stage text-center">
            <div class="glass-panel space-y-10">
                <h2 id="ending-title" class="serif text-3xl text-white"></h2>
                <div id="ending-desc" class="space-y-6 text-neutral-300 font-light leading-relaxed text-base"></div>
                <div class="flex flex-col gap-4">
                    <!-- 改為超連結，指向你未來的 info.html 檔案 -->
                    <a href="info.html" class="w-full py-4 bg-blue-600 text-white font-bold tracking-widest hover:bg-blue-700 transition-all text-xs rounded-lg uppercase flex items-center justify-center">
                        了解更多資訊
                    </a>
                    <button onclick="location.reload()" class="w-full py-4 border border-white/20 text-neutral-400 hover:text-white hover:border-white transition-all text-[10px] tracking-[0.4em] rounded-lg uppercase">
                        重新開始
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- 回饋遮罩 -->
    <div id="feedback-overlay">
        <div class="max-w-md space-y-12">
            <p id="feedback-text" class="text-xl text-white font-light serif leading-relaxed italic"></p>
            <button id="next-btn" onclick="nextScenario()" class="text-[10px] tracking-[0.5em] text-white/40 hover:text-white transition-colors uppercase py-4">
                下一個抉擇 ➜
            </button>
        </div>
    </div>

    <script>
        const state = {
            patient: 80,
            dignity: 80,
            burden: 80,
            currentIdx: 0,
            isLocked: false,
            activeImgId: 'bg-img-a'
        };

        const scenarios = [
            {
                title: '晚餐過後',
                desc: '吃完晚餐才十分鐘，他第十五次詢問「我們什麼時候吃飯？」。你剛結束整天的加班，耐心已消磨殆盡。',
                options: [
                    { text: '深呼吸，溫柔地帶他去看剛吃完的空碗。', impact: { patient: 5, dignity: 5, burden: -10 }, feedback: '他露出困惑但安心的神情。你卻在轉身時感到一陣巨大的疲憊。' },
                    { text: '不再爭論，再給他準備一份少量的點心。', impact: { patient: 10, dignity: 0, burden: -5 }, feedback: '他高興地吃了。但你擔心長久下去他的血糖與體重會失控。' },
                    { text: '終於崩潰大喊：「你剛剛才吃過！為什麼一直問！」', impact: { patient: -15, dignity: -20, burden: 5 }, feedback: '他被嚇壞了，縮在沙發角落。家裡安靜了，但空氣中充滿了罪惡感。' }
                ]
            },
            {
                title: '我還要去上班',
                desc: '他堅持自己還能上班，但同事發現他連簡單的報表都會出錯。老闆私下找你，婉轉表達希望他「提前退休」。',
                options: [
                    { text: '實話實說，告訴他社會現在還沒準備好接納他。', impact: { patient: -10, dignity: -25, burden: 10 }, feedback: '他沉默地撕掉識別證，眼神裡最後的光熄滅了。' },
                    { text: '騙他公司在改組，先休息一陣子。', impact: { patient: 5, dignity: 15, burden: -10 }, feedback: '保住了他的自尊，但他每天準時著裝待發，讓謊言變得更難圓。' },
                    { text: '自己開個「家庭工作室」，讓他處理簡單家務並付他「薪水」。', impact: { patient: 15, dignity: 20, burden: -20 }, feedback: '他覺得自己很有用。但你的經濟與心理壓力變得更加沈重。' }
                ]
            },
            {
                title: '老友聚會',
                desc: '昔日老友邀你參加聚會，你很想去呼吸新鮮空氣，但他現在只要你不在視線內就會極度焦慮。',
                options: [
                    { text: '帶著他一起參加，希望能讓他接觸人群。', impact: { patient: -10, dignity: -15, burden: -25 }, feedback: '他在餐廳因吵雜而尖叫。老友們的憐憫眼神讓你感覺自己與世界脫節。' },
                    { text: '婉拒邀請，留在家陪他看舊影片。', impact: { patient: 10, dignity: 5, burden: -15 }, feedback: '他在你的陪伴下很平穩，但你看著群組的照片，感到自己正被世界遺棄。' },
                    { text: '請臨時看護代班兩小時，自己偷偷跑去喝杯咖啡。', impact: { patient: -10, dignity: 0, burden: 25 }, feedback: '那一小段自由讓你重新活過來，但一踏進家門面對他的哭鬧，壓力倍增。' }
                ]
            },
            {
                title: '請問你是？',
                desc: '你帶他回到當初約會的公園。他指著你問：「這位小姐/先生，你是誰？我媽媽怎麼沒來接我？」',
                options: [
                    { text: '泣不成聲，拿出相簿一遍一遍唸著自己的名字。', impact: { patient: -10, dignity: -10, burden: -15 }, feedback: '他感到無比焦慮，開始用力抓頭髮。這場重遊變成了災難。' },
                    { text: '強忍悲傷，假裝自己是他的朋友繼續聊天。', impact: { patient: 15, dignity: 0, burden: -10 }, feedback: '他平靜下來了，像個孩子一樣對你微笑，但你心裡最後的一塊牆塌了。' },
                    { text: '靜靜地陪他在長椅上看夕陽，不再勉強他想起什麼。', impact: { patient: 20, dignity: 10, burden: 10 }, feedback: '那一刻的寧靜是這幾個月最奢侈的禮物。雖然他記不起你，但當下是和諧的。' }
                ]
            },
            {
                title: '錢去哪了？',
                desc: '你發現他偷偷用了信用卡，在網路上訂購了二十台同樣的除濕機，因為他忘記自己已經訂過了。',
                options: [
                    { text: '忍痛支付退貨運費，並耐心地收好信用卡。', impact: { patient: 0, dignity: 5, burden: -20 }, feedback: '財務損失了，但你沒有責怪他。看著客廳滿地的箱子，你感到無力。' },
                    { text: '嚴厲地沒收他的手機與電腦，斷絕網路。', impact: { patient: -25, dignity: -35, burden: 15 }, feedback: '他失去了與世界的最後連結，像個被關起來的囚犯，對你產生敵意。' },
                    { text: '將金融帳號交給親友代管，尋求外部介入。', impact: { patient: -5, dignity: -10, burden: 20 }, feedback: '財務安全了，但在親友面前解釋這些不堪，讓你精疲力竭。' }
                ]
            },
            {
                title: '你到底要去哪裡？',
                desc: '一轉頭，他趁你曬衣服時推門出去。三小時後警察在河邊發現他，他赤腳走在泥濘中，神情驚恐。',
                options: [
                    { text: '緊緊抱住他，什麼都不責備。', impact: { patient: 20, dignity: 15, burden: -15 }, feedback: '他像孩子般大哭。但你意識到，你必須把家變成一座更堅固的「監牢」。' },
                    { text: '幫他掛上刻有電話與病況的防走失手鍊。', impact: { patient: 0, dignity: -30, burden: 15 }, feedback: '安全性提升了，但看著那條手鍊，你覺得那是他身為成年人尊嚴的墓碑。' },
                    { text: '鎖上所有對外的窗戶，並安裝 24 小時監控。', impact: { patient: -20, dignity: -25, burden: 20 }, feedback: '再也不會走失，但他在監控畫面中孤獨轉圈的模樣，讓你心如刀割。' }
                ]
            },
            {
                title: '我想去廁所',
                desc: '他現在連如廁都需要你全程協助。這天深夜，他因為排泄問題弄髒了床鋪，正一臉愧疚地看著疲憊的你。',
                options: [
                    { text: '溫柔地說「沒關係，洗洗就好」，默默清理殘局。', impact: { patient: 15, dignity: 20, burden: -25 }, feedback: '你保住了他的尊嚴。但看著深夜三點的洗衣機，你覺得自己也快溶化了。' },
                    { text: '開始考慮讓他穿上成人紙尿褲。', impact: { patient: -10, dignity: -40, burden: 20 }, feedback: '體力輕鬆了點，但他看著尿布流下的眼淚，讓你也跟著心碎。' },
                    { text: '終於打電話預約了昂貴的護理中心。', impact: { patient: -30, dignity: -10, burden: 40 }, feedback: '這是一個逃生口，但簽名字時，你的手在發抖。' }
                ]
            },
            {
                title: '我還記得你',
                desc: '病情急轉直下，他在大部份時間都只是對著牆壁發呆。但在這刻深夜，他突然看著你的眼睛，輕輕喊出了你的名字。',
                options: [
                    { text: '泣不成聲，緊緊握住他的手，回報這一絲光芒。', impact: { patient: 30, dignity: 20, burden: -10 }, feedback: '這聲呼喚支撐了你接下來半年的勇氣。' },
                    { text: '趕緊錄影傳給親友分享奇蹟。', impact: { patient: 10, dignity: 10, burden: -5 }, feedback: '大家都為你打氣，但在錄完後，他又回到了那片無盡的迷霧。' },
                    { text: '決定就在此時告別，正式簽下長期住院書。', impact: { patient: -50, dignity: -10, burden: 50 }, feedback: '你想在最後一刻留下美好的記憶。轉身離開，讓他留在專業照顧中。' }
                ]
            }
        ];

        function changeBackground(fileName) {
            const nextImgId = state.activeImgId === 'bg-img-a' ? 'bg-img-b' : 'bg-img-a';
            const currentImg = document.getElementById(state.activeImgId);
            const nextImg = document.getElementById(nextImgId);
            
            nextImg.src = `pic/${fileName}.png`;
            
            nextImg.onload = function() {
                nextImg.classList.add('active');
                currentImg.classList.remove('active');
                state.activeImgId = nextImgId;
            };

            nextImg.onerror = function() {
                console.error(`背景圖片載入失敗: pic/${fileName}.png`);
            };
        }

        function hideAll() {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById('feedback-overlay').classList.remove('active');
            document.getElementById('status-bar').classList.add('hidden');
        }

        function showStage(name) {
            hideAll();
            const target = document.getElementById(name);
            if (target) {
                target.classList.add('active');
            }
            
            if (name !== 'game') {
                changeBackground('start');
            } else {
                document.getElementById('status-bar').classList.remove('hidden');
            }
            window.scrollTo(0, 0);
        }

        function startGame() {
            state.currentIdx = 0;
            state.patient = 80; state.dignity = 80; state.burden = 80;
            refreshBars();
            showStage('game');
            loadScenario();
        }

        function loadScenario() {
            const sc = scenarios[state.currentIdx];
            if (!sc) {
                showFinalEnding();
                return;
            }

            state.isLocked = false;
            const content = document.getElementById('game-content');
            content.style.opacity = '0';
            
            changeBackground(`scene${state.currentIdx + 1}`);

            document.getElementById('scen-counter').innerText = `抉擇 ${state.currentIdx + 1} / ${scenarios.length}`;
            document.getElementById('scen-title').innerText = sc.title;
            document.getElementById('scen-desc').innerText = sc.desc;
            
            const optBox = document.getElementById('scen-options');
            optBox.innerHTML = '';
            sc.options.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'btn-option';
                b.innerText = o.text;
                b.onclick = () => handleChoice(i);
                optBox.appendChild(b);
            });

            setTimeout(() => { content.style.opacity = '1'; }, 300);
        }

        function handleChoice(idx) {
            if (state.isLocked) return;
            const opt = scenarios[state.currentIdx].options[idx];
            state.isLocked = true;

            state.patient = Math.min(100, Math.max(0, state.patient + opt.impact.patient));
            state.dignity = Math.min(100, Math.max(0, state.dignity + opt.impact.dignity));
            state.burden = Math.min(100, Math.max(0, state.burden + opt.impact.burden));
            
            refreshBars();
            document.getElementById('feedback-text').innerText = opt.feedback;
            document.getElementById('feedback-overlay').classList.add('active');
        }

        function refreshBars() {
            ['patient', 'dignity', 'burden'].forEach(k => {
                const bar = document.getElementById('bar-' + k);
                const val = document.getElementById('val-' + k);
                if (bar) bar.style.width = state[k] + '%';
                if (val) val.innerText = state[k];
            });
            
            if (state.patient <= 0 || state.dignity <= 0 || state.burden <= 0) {
                setTimeout(() => {
                    hideAll();
                    changeBackground('start');
                    document.getElementById('ending').classList.add('active');
                    document.getElementById('ending-title').innerText = "生命之火已燃盡";
                    document.getElementById('ending-desc').innerHTML = "<p>在無盡的選擇中，你們都已筋疲力盡。<br>這不僅是體力的透支，更是靈魂的乾涸。<br>失智症不僅帶走了他的記憶，也消磨了你的人生。</p>";
                }, 800);
            }
        }

        function nextScenario() {
            document.getElementById('feedback-overlay').classList.remove('active');
            state.currentIdx++;
            loadScenario();
        }

        function showFinalEnding() {
            showStage('ending');
            changeBackground('start');
            document.getElementById('ending-title').innerText = "漫長告別的開始";
            document.getElementById('ending-desc').innerHTML = `
                <p>這八個抉擇，只是年輕失智症患者家屬生活的冰山一角。</p>
                <p>從最初的健忘，到後來的性格劇變，最後甚至連家人都忘記了。</p>
                <p>年輕型失智症最殘酷的地方，在於它發生在原本應當成家立業、支撐家庭的年紀。<br><br><strong>「他好像在，又好像不在。」</strong><br><br>希望這段短暫的體驗，能讓你多一份理解與善意。</p>
            `;
        }

        window.onload = () => {
            document.getElementById('bg-img-a').src = 'pic/start.png';
            document.getElementById('bg-img-a').classList.add('active');
        };
    </script>
</body>
</html>
