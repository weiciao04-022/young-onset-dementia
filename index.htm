<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>年輕型失智症：該如何抉擇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0a0a0a;
            --glass: rgba(18, 18, 18, 0.85);
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
        }
        body {
            background: var(--primary-bg);
            color: #f5f5f5;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .serif { font-family: 'Noto Serif TC', serif; }
        
        #bg-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #000;
        }

        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.35);
            transition: opacity 2s ease-in-out;
            opacity: 0;
        }
        .bg-image.active { opacity: 1; }

        /* 全螢幕閃爍警示層 */
        #danger-overlay {
            position: fixed;
            inset: 0;
            z-index: 50; 
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            background-color: rgba(239, 68, 68, 0);
        }
        
        #danger-overlay.active {
            animation: full-screen-danger 1.5s infinite ease-in-out;
            opacity: 1;
        }

        @keyframes full-screen-danger {
            0%, 100% { 
                background-color: rgba(239, 68, 68, 0); 
                box-shadow: inset 0 0 0px rgba(239, 68, 68, 0);
            }
            50% { 
                background-color: rgba(239, 68, 68, 0.15); 
                box-shadow: inset 0 0 150px rgba(239, 68, 68, 0.6); 
            }
        }

        /* 頂部狀態列 */
        #status-dashboard {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 480px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1rem;
            padding: 0.75rem;
            display: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        #status-dashboard.active { display: block; }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.5rem;
            padding: 0.4rem 0.6rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-warning {
            border-color: rgba(239, 68, 68, 0.6);
            background: rgba(239, 68, 68, 0.15);
        }

        .progress-container {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }

        .bar { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }

        .animate-pulse-fast {
            animation: pulse-fast 0.8s infinite;
        }

        @keyframes pulse-fast {
            0%, 100% { opacity: 1; filter: brightness(1.2); }
            50% { opacity: 0.5; filter: brightness(0.8); }
        }

        /* 遊戲排版 */
        .stage { 
            display: none; 
            min-height: 100vh;
            padding: 120px 1.25rem 40px; 
        }
        .stage.active { display: flex; flex-direction: column; justify-content: center; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2.25rem 1.75rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 60; 
        }

        .btn-option {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.5;
            transition: all 0.3s ease;
            color: #e0e0e0;
            text-align: left;
            margin-bottom: 0.85rem;
            position: relative;
            overflow: hidden;
        }
        .btn-option:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.15); }
        @media (min-width: 768px) {
            .btn-option:hover { background: #fff; color: #000; transform: translateX(8px); }
        }

        #feedback-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            z-index: 200;
            display: none;
            padding: 2.5rem;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #feedback-overlay.active { display: flex; }

        .fade-up { animation: fadeUp 1s ease-out forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="bg-container">
        <img id="bg-img-a" class="bg-image" alt="">
        <img id="bg-img-b" class="bg-image" alt="">
    </div>

    <!-- 全螢幕閃爍警示層 -->
    <div id="danger-overlay"></div>

    <!-- 狀態面板 -->
    <div id="status-dashboard">
        <div class="grid grid-cols-3 gap-3">
            <div id="card-patient" class="stat-card border border-transparent">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-bold text-blue-400 tracking-wider">患者狀態</span>
                    <span id="val-patient" class="text-[11px] font-mono font-bold text-white">70</span>
                </div>
                <div class="progress-container">
                    <div id="bar-patient" class="bar bg-blue-500" style="width: 70%"></div>
                </div>
            </div>
            <div id="card-dignity" class="stat-card border border-transparent">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-bold text-stone-300 tracking-wider">生命尊嚴</span>
                    <span id="val-dignity" class="text-[11px] font-mono font-bold text-white">70</span>
                </div>
                <div class="progress-container">
                    <div id="bar-dignity" class="bar bg-stone-100" style="width: 70%"></div>
                </div>
            </div>
            <div id="card-burden" class="stat-card border border-transparent">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-bold text-red-500 tracking-wider">照顧負荷</span>
                    <span id="val-burden" class="text-[11px] font-mono font-bold text-white">50</span>
                </div>
                <div class="progress-container">
                    <div id="bar-burden" class="bar bg-red-600" style="width: 50%"></div>
                </div>
            </div>
        </div>
    </div>

    <main class="relative z-10">
        <section id="prologue" class="stage active">
            <div class="glass-panel text-center fade-up space-y-6">
                <h1 class="serif text-2xl font-bold text-white tracking-widest">面對年輕失智症患者<br><span class="text-sm opacity-50 font-light">該如何抉擇</span></h1>
                <div class="space-y-4 text-neutral-300 font-light leading-relaxed text-sm">
                    <p>他以前是家裡最可靠的人。</p>
                    <p>出門前會記得關上所有燈，會提醒你帶鑰匙。</p>
                    <p class="serif text-white text-base italic border-y border-white/10 py-4">「醫生說，這是失智症。」</p>
                    <p>那年，他還不到四十歲。</p>
                    <p>從那天開始，你發現很多事情沒有對的做法。</p>
                    <p>只有選擇，然後承擔。</p>
                </div>
                <button onclick="showStage('intro')" class="w-full py-4 bg-white/10 border border-white/20 text-white rounded-xl text-xs tracking-widest uppercase">開始了解</button>
            </div>
        </section>

        <section id="intro" class="stage">
            <div class="glass-panel text-center fade-up space-y-8">
                <h2 class="serif text-xl text-white">你認為目前<br>最年輕的失智症患者是幾歲？</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="showStage('answer')" class="py-6 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all">21 歲</button>
                    <button onclick="showStage('answer')" class="py-6 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all">35 歲</button>
                    <button onclick="showStage('answer')" class="py-6 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all">19 歲</button>
                    <button onclick="showStage('answer')" class="py-6 bg-white/5 border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all">45 歲</button>
                </div>
            </div>
        </section>

        <section id="answer" class="stage">
            <div class="glass-panel text-center fade-up space-y-8">
                <div class="space-y-1">
                    <p class="text-[9px] tracking-widest text-neutral-500 uppercase">Scientific Record</p>
                    <h2 class="serif text-8xl text-white font-bold">19</h2>
                </div>
                <p class="text-neutral-300 font-light leading-relaxed text-sm">這不是特例。<br>失智症不只發生在老年。<br>隨著記憶消逝，家屬的考驗才剛開始。</p>
                <button onclick="startGame()" class="w-full py-4 bg-white text-black font-bold rounded-xl text-xs tracking-widest uppercase">進入家屬視角</button>
            </div>
        </section>

        <section id="game" class="stage">
            <div class="glass-panel fade-up space-y-6">
                <div class="border-b border-white/10 pb-4">
                    <p id="scen-counter" class="text-[9px] text-white/40 tracking-widest uppercase mb-1"></p>
                    <h3 id="scen-title" class="serif text-xl text-white font-bold"></h3>
                </div>
                <p id="scen-desc" class="text-sm text-neutral-300 font-light leading-relaxed"></p>
                <div id="scen-options" class="pt-2"></div>
            </div>
        </section>

        <section id="ending" class="stage">
            <div class="glass-panel text-center fade-up space-y-8">
                <h2 id="ending-title" class="serif text-2xl text-white"></h2>
                <div id="ending-desc" class="text-sm text-neutral-300 font-light leading-relaxed text-left space-y-4"></div>
                <button onclick="location.reload()" class="w-full py-4 bg-white text-black font-bold rounded-xl text-xs tracking-widest uppercase">再次體驗</button>
            </div>
        </section>
    </main>

    <div id="feedback-overlay">
        <div class="max-w-xs w-full space-y-10">
            <p id="feedback-text" class="text-lg text-white font-light serif leading-relaxed italic"></p>
            <button onclick="nextScenario()" class="text-[10px] tracking-widest text-white/50 hover:text-white uppercase py-4">繼續前行 ➜</button>
        </div>
    </div>

    <script>
        const state = {
            patient: 70,
            dignity: 70,
            burden: 50,
            currentIdx: 0,
            activeImgId: 'bg-img-a'
        };

        const scenarios = [
            {
                title: '混亂的餐桌',
                desc: '他剛吃完飯不到五分鐘，又走進廚房問你：「今天不吃嗎？」這已經是今晚第十次。你剛加完班，全身疲憊不堪。',
                options: [
                    { text: '帶他去看剛洗好的碗，慢慢告訴他已經吃過了。', impact: { patient: 8, dignity: 5, burden: 12 }, feedback: '他盯著水槽看了一下，點點頭。但過沒多久，他又問了一樣的問題。' },
                    { text: '再幫他盛一點飯，讓他安心吃完。', impact: { patient: 12, dignity: 0, burden: 8 }, feedback: '他很自然地坐下來吃。你開始想，這樣會不會變成每天都要多吃一餐。' },
                    { text: '忍不住提高音量：「你剛剛才吃過！」', impact: { patient: -15, dignity: -10, burden: -5 }, feedback: '他愣住了，沒有再問。整個空間突然變得很安靜。' }
                ]
            },
            {
                title: '提早到來的退休',
                desc: '公司打電話來，希望他「先休息一段時間」。他以前幾乎每天加班，現在連怎麼去公司都有點記不起來。',
                options: [
                    { text: '直接跟他說公司希望他先離開。', impact: { patient: -10, dignity: -25, burden: 10 }, feedback: '他看著工作證很久，最後只問了一句：「那我以後要做什麼？」' },
                    { text: '告訴他公司最近狀況不好，很多人都離職。', impact: { patient: 5, dignity: 10, burden: 15 }, feedback: '他點點頭，沒有再追問。但你必須扛起所有經濟空缺。' },
                    { text: '幫他找一個比較簡單的工作，讓他還能每天出門。', impact: { patient: 10, dignity: 15, burden: 25 }, feedback: '他照樣每天準時出門。你開始習慣接陌生電話，確認他今天在哪裡。' }
                ]
            },
            {
                title: '童年的回憶',
                desc: '你帶他回到以前常去的公園。他看著你，問：「這是哪裡？你是誰？」語氣很平常，像在問路。',
                options: [
                    { text: '拿出以前的照片，一張一張講給他聽', impact: { patient: -10, dignity: -10, burden: 15 }, feedback: '他看著照片，眉頭越皺越緊，好像越看越不確定。' },
                    { text: '順著他的狀態，當作第一次認識他。', impact: { patient: 15, dignity: 0, burden: 10 }, feedback: '他對你很有禮貌地笑，像在認識一個新朋友。' },
                    { text: '不強求記憶，只是靜氣地陪他坐在長椅上。', impact: { patient: 20, dignity: 10, burden: 5 }, feedback: '他安靜下來了。你們坐了很久，但幾乎沒有對話。' }
                ]
            },
            {
                title: '失控的超市',
                desc: '你接到超市電話：「是不會管好家人嗎？偷拆冰淇淋和餅乾吃也太誇張了吧！」你趕到時，他正被眾人圍觀，臉上掛著無辜又困惑的表情。',
                options: [
                    { text: '對工作人員鞠躬道歉，並沒收他的卡片手機。', impact: { patient: -15, dignity: -40, burden: 20 }, feedback: '衝突解決了，但他變得很怕出門，和社會慢慢脫軌。' },
                    { text: '冷靜賠償，告訴超市他生病了。', impact: { patient: 5, dignity: -30, burden: 10 }, feedback: '超市理解了，也讓他在世人眼中留下失智的標籤。' },
                    { text: '自己扛下責難，每天陪他逛街以防意外。', impact: { patient: 10, dignity: 15, burden: 40 }, feedback: '他的尊嚴完好無損，但你再也沒有私人時間。' }
                ]
            },
            {
                title: '你去哪了？',
                desc: '你只是去陽台曬個衣服，他就不見了。三小時後警察打來，說在高架橋下找到他。他連鞋子都沒有穿。',
                options: [
                    { text: '緊緊抱住他，先帶他回家，不提剛剛發生的事。', impact: { patient: 20, dignity: 15, burden: 15 }, feedback: '他像孩子般大哭。你決定在家裡加裝更多的鎖。' },
                    { text: '幫他戴上明顯的失智症專屬識別手環。', impact: { patient: 0, dignity: -40, burden: -10 }, feedback: '之後出門安心很多，但他看到手環時，會一直想把它拿掉。' },
                    { text: '在家裝監視設備，隨時用手機確認他的位置。', impact: { patient: -10, dignity: -10, burden: 35 }, feedback: '你開始一直看手機。就算他在家，也很難真正放鬆。' }
                ]
            },
            {
                title: '連出門都很困難',
                desc: '你和他一起出門，他一臉羞愧，告訴你他尿褲子、沒辦法控制、無助地看著剛睡不到三小時的你。',
                options: [
                    { text: '溫柔地說「沒關係，我也會這樣」，動手清理。', impact: { patient: 10, dignity: 30, burden: 25 }, feedback: '他一直重複說對不起。你陪他慢慢清理，眼淚也不停的流' },
                    { text: '讓他穿上成人紙尿褲。', impact: { patient: -5, dignity: -40, burden: -10 }, feedback: '不用處理尿失禁，但他變得不太願意靠近別人。' },
                    { text: '連夜預約了全日制的專業養護中心。', impact: { patient: -40, dignity: -15, burden: -40 }, feedback: '聊完養護中心細項，你掛掉後自己一個人坐了很久，擔心他在那邊會不會收到好的照顧。' }
                ]
            }
        ];

        function changeBackground(fileName) {
            const nextImgId = state.activeImgId === 'bg-img-a' ? 'bg-img-b' : 'bg-img-a';
            const currentImg = document.getElementById(state.activeImgId);
            const nextImg = document.getElementById(nextImgId);
            const newSrc = `pic/${fileName}.png`;
            
            const tempImg = new Image();
            tempImg.src = newSrc;
            tempImg.onload = () => {
                nextImg.src = newSrc;
                nextImg.classList.add('active');
                currentImg.classList.remove('active');
                state.activeImgId = nextImgId;
            };
        }

        function showStage(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            if (id === 'game') {
                document.getElementById('status-dashboard').classList.add('active');
            } else {
                document.getElementById('status-dashboard').classList.remove('active');
                document.getElementById('danger-overlay').classList.remove('active');
                changeBackground('start');
            }
            window.scrollTo(0, 0);
        }

        function startGame() {
            state.currentIdx = 0;
            state.patient = 70; state.dignity = 70; state.burden = 50;
            updateStats();
            showStage('game');
            loadScenario();
        }

        function loadScenario() {
            const sc = scenarios[state.currentIdx];
            if (!sc) {
                calculateEnding();
                return;
            }

            changeBackground(`scene${state.currentIdx + 1}`);
            document.getElementById('scen-counter').innerText = `抉擇 ${state.currentIdx + 1} / ${scenarios.length}`;
            document.getElementById('scen-title').innerText = sc.title;
            document.getElementById('scen-desc').innerText = sc.desc;
            
            const optBox = document.getElementById('scen-options');
            optBox.innerHTML = '';
            sc.options.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'btn-option';
                b.innerText = o.text;
                b.onclick = () => selectOption(i);
                optBox.appendChild(b);
            });
        }

        function selectOption(idx) {
            const opt = scenarios[state.currentIdx].options[idx];
            state.patient = Math.min(100, Math.max(0, state.patient + opt.impact.patient));
            state.dignity = Math.min(100, Math.max(0, state.dignity + opt.impact.dignity));
            state.burden = Math.min(100, Math.max(0, state.burden + opt.impact.burden));
            
            updateStats();
            
            document.getElementById('feedback-text').innerText = opt.feedback;
            document.getElementById('feedback-overlay').classList.add('active');
        }

        function updateStats() {
            document.getElementById('val-patient').innerText = state.patient;
            document.getElementById('val-dignity').innerText = state.dignity;
            document.getElementById('val-burden').innerText = state.burden;

            document.getElementById('bar-patient').style.width = state.patient + '%';
            document.getElementById('bar-dignity').style.width = state.dignity + '%';
            document.getElementById('bar-burden').style.width = state.burden + '%';

            const dangerOverlay = document.getElementById('danger-overlay');
            if (state.burden > 80 || state.patient < 25 || state.dignity < 25) {
                dangerOverlay.classList.add('active');
            } else {
                dangerOverlay.classList.remove('active');
            }

            handleStatIndicator('patient', state.patient < 25);
            handleStatIndicator('dignity', state.dignity < 25);
            handleStatIndicator('burden', state.burden > 80);

            if (state.burden >= 100) triggerFail('burden');
            else if (state.patient <= 0) triggerFail('patient');
            else if (state.dignity <= 0) triggerFail('dignity');
        }

        function handleStatIndicator(type, isWarning) {
            const card = document.getElementById(`card-${type}`);
            const bar = document.getElementById(`bar-${type}`);
            if (isWarning) {
                card.classList.add('stat-warning');
                bar.classList.add('animate-pulse-fast');
            } else {
                card.classList.remove('stat-warning');
                bar.classList.remove('animate-pulse-fast');
            }
        }

        function nextScenario() {
            document.getElementById('feedback-overlay').classList.remove('active');
            state.currentIdx++;
            loadScenario();
        }

        function triggerFail(type) {
            document.getElementById('feedback-overlay').classList.remove('active');
            document.getElementById('danger-overlay').classList.remove('active');
            showStage('ending');
            document.getElementById('ending-title').innerText = "你的精力耗盡";
            const desc = document.getElementById('ending-desc');
            if (type === 'burden') desc.innerHTML = "<p>你開始記不清上一次好好睡覺是什麼時候。有些決定不是你不想撐，而是真的撐不住了。</p>";
            else if (type === 'patient') desc.innerHTML = "<p>他變得很少有反應。你還是每天照顧他，但越來越難分辨他有沒有在聽。</p>";
            else desc.innerHTML = "<p>生活變得只剩下處理問題，也沒有考慮過他的尊嚴，他也不太能接受這些做法，這場照顧變得像是一種羞辱。</p>";
        }

        function calculateEnding() {
            document.getElementById('danger-overlay').classList.remove('active');
            showStage('ending');
            const title = document.getElementById('ending-title');
            const desc = document.getElementById('ending-desc');

            if (state.burden > state.patient && state.burden > state.dignity) {
                title.innerText = "結局：沈重的愛";
                desc.innerHTML = `<p>你扛下了一切，但代價是幾乎失去了自己。在他離開後，你認為你盡力了，但這就是盡力後的結局嗎？</p>`;
            } else if (state.dignity > state.patient) {
                title.innerText = "結局：尊嚴守護者";
                desc.innerHTML = `<p>直到最後，你都努力讓他維持著成年人的尊嚴。雖然辛苦，但讓他在最混亂的時刻，依然被當作一個人對待。</p>`;
            } else {
                title.innerText = "結局：勉強共存";
                desc.innerHTML = `<p>你慢慢習慣現在的生活節奏。有些事情不再追問，有些時候就順著過。但重要的是，你們仍然在一起</p>`;
            }
        }

        window.onload = () => {
            const initialImg = document.getElementById('bg-img-a');
            initialImg.src = 'pic/start.png';
            initialImg.classList.add('active');
        };
    </script>
</body>
</html>
